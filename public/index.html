<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VP Setup Analyzer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');
:root{
  --bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e2e2e2;--text2:#777;--text3:#444;
  --green:#4ade80;--gbg:rgba(74,222,128,0.08);--gborder:rgba(74,222,128,0.25);
  --red:#f87171;--rbg:rgba(248,113,113,0.08);--rborder:rgba(248,113,113,0.25);
  --r:9px;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;min-height:100vh;padding:1.75rem 1rem;}
.wrap{max-width:700px;margin:0 auto;}
header{display:flex;align-items:baseline;gap:10px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:0.5px solid var(--border);}
header h1{font-size:16px;font-weight:500;}
header span{font-size:12px;color:var(--text3);font-family:var(--mono);}
.sec{margin-bottom:1rem;}
.lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:6px;font-family:var(--mono);}
.drop{border:1px dashed var(--border2);border-radius:var(--r);padding:2.5rem 1rem;text-align:center;cursor:pointer;background:var(--bg2);position:relative;transition:all 0.12s;}
.drop:hover,.drop.drag{border-color:rgba(255,255,255,0.25);background:var(--bg3);}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:18px;margin-bottom:8px;opacity:0.35;}
.drop-txt{font-size:13px;color:var(--text2);}
.drop-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.prev{position:relative;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--border2);}
.prev img{width:100%;display:block;max-height:360px;object-fit:contain;background:#000;}
.prev-x{position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.75);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
select,input[type=text]{width:100%;padding:8px 11px;font-size:13px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);outline:none;}
select:focus,input[type=text]:focus{border-color:rgba(255,255,255,0.28);}
.btn{width:100%;padding:11px;font-size:13px;font-weight:500;border:0.5px solid var(--border2);border-radius:var(--r);background:transparent;color:var(--text);cursor:pointer;font-family:var(--font);transition:all 0.12s;margin-top:0.6rem;}
.btn:hover{background:var(--bg3);border-color:rgba(255,255,255,0.28);}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.sp{display:inline-block;width:12px;height:12px;border:1.5px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{color:var(--red);font-size:11px;margin-top:6px;font-family:var(--mono);display:none;}
.sent-card{display:none;margin-top:1.25rem;border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sent-top{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1.1rem;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.sent-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);font-family:var(--mono);}
.sent-pct{display:flex;gap:14px;font-size:13px;font-family:var(--mono);font-weight:500;}
.pct-long{color:var(--green);}
.pct-short{color:var(--red);}
.tank{position:relative;height:64px;background:#0a0a0a;overflow:hidden;}
.liq-g{position:absolute;left:0;top:0;bottom:0;width:50%;background:linear-gradient(135deg,#166534 0%,#16a34a 40%,#4ade80 100%);transition:width 1.4s cubic-bezier(0.34,1.56,0.64,1);}
.liq-r{position:absolute;right:0;top:0;bottom:0;width:50%;background:linear-gradient(225deg,#7f1d1d 0%,#dc2626 40%,#f87171 100%);transition:width 1.4s cubic-bezier(0.34,1.56,0.64,1);}
.wave-g,.wave-r{position:absolute;top:0;left:0;right:0;height:100%;}
.liq-div{position:absolute;top:0;bottom:0;width:2px;background:rgba(255,255,255,0.15);left:50%;transform:translateX(-50%);transition:left 1.4s cubic-bezier(0.34,1.56,0.64,1);}
.tank-labels{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 14px;}
.tank-lbl{font-size:11px;font-family:var(--mono);}
.sent-source{padding:0.4rem 1.1rem;font-size:10px;color:var(--text3);font-family:var(--mono);background:var(--bg2);}
.fix-box{display:none;margin-top:0.6rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:0.75rem 1.1rem;}
.sc-wrap{display:none;margin-top:0.75rem;}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;}
.sc-item{padding:0.85rem 1.1rem;border-bottom:0.5px solid var(--border);}
.sc-num{font-size:10px;font-family:var(--mono);color:var(--text3);}
.sc-body{font-size:12px;color:var(--text2);}
</style>
</head>

<body>
<div class="wrap">
<button onclick="test()">TEST</button>

<div class="sc-wrap" id="scWrap">
  <div class="sc-grid">
    <div id="colBull"></div>
    <div id="colBear"></div>
  </div>
</div>

<script>

/* 🔥 POPRAVLJENO */
function renderSetups(text){

  function parseThree(block){
    if(!block) return [];
    return block.split(/\n(?=Setup\s*\d)/i)
      .map(s=>s.replace(/Setup\s*\d+/i,'').trim())
      .filter(s=>s.length>5);
  }

  const bullBlock=text.match(/BIKOVNI[\s\S]*?(?=MEDVEDJI|$)/i);
  const bearBlock=text.match(/MEDVEDJI[\s\S]*$/i);

  const bulls=parseThree(bullBlock?bullBlock[0]:'');
  const bears=parseThree(bearBlock?bearBlock[0]:'');

  function fillCol(items, colId){
    const col=document.getElementById(colId);
    col.innerHTML='';

    if(items.length === 0){
      col.innerHTML = `<div style="color:gray">Ni setupov</div>`;
      return;
    }

    items.forEach((item, i)=>{
      const div=document.createElement('div');
      div.className='sc-item';
      div.innerHTML=`
        <div class="sc-num">Setup ${i+1}</div>
        <div class="sc-body">${item.replace(/\n/g,'<br>')}</div>
      `;
      col.appendChild(div);
    });
  }

  fillCol(bulls,'colBull');
  fillCol(bears,'colBear');

  document.getElementById('scWrap').style.display='block';
}

/* test */
function test(){
  renderSetups(`BIKOVNI
Setup 1
Vstop: nekaj
TP: nekaj

MEDVEDJI
Setup 1
Vstop: nekaj`);
}

</script>
</body>
</html>
